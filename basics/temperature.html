<h1>天线温度（Temperature）</h1>
<p>天线温度是天线及其工作环境共同决定的属性，衡量的是天线因热效应而接收到的噪声。</p>
<div class="formula"><strong>TA = (1/4π) ∫∫ T(θ,φ) · G(θ,φ) dΩ</strong><br>TA = 天线温度 | T = 环境温度分布 | G = 天线增益方向图</div>
<h2>典型天线温度</h2>
<ul>
<li><strong>指向冷空的卫星天线</strong>：约几K到几十K</li>
<li><strong>指向地面的天线</strong>：约290K（环境温度）</li>
<li><strong>全向天线</strong>：取决于周围环境</li>
</ul>
<div class="note"><strong>噪声温度与噪声功率</strong>：Pn = k·T·B，k为玻尔兹曼常数，B为带宽</div>
