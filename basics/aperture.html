<h1>有效口径（Aperture）</h1>
<p>有效口径是衡量天线从平面波中捕获功率能力的基本概念。</p>
<div class="formula"><strong>Ae = (G × λ²) / (4π)</strong><br>Ae = 有效口径 | G = 增益 | λ = 波长</div>
<h2>物理意义</h2>
<p>有效口径可以理解为天线的"接收面积"。对于口径天线（如喇叭天线、抛物面天线），有效口径通常小于物理口径。</p>
<h2>口径效率</h2>
<p>口径效率 = 有效口径 / 物理口径</p>
<p>典型值：50%-80%</p>
