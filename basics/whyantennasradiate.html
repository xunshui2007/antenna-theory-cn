<h1>天线为什么会辐射</h1>
<p>天线辐射的物理原理：当电子在导线上加速运动时，会产生电磁场。</p>
<h2>辐射的物理基础</h2>
<ul>
<li>变化的电场产生磁场</li>
<li>变化的磁场产生电场</li>
<li>当导线上的电流以适当频率振荡时，电磁场相互激发形成向外传播的电磁波</li>
</ul>
<h2>辐射条件</h2>
<ul>
<li>导线上存在加速运动的电荷</li>
<li>导线长度与波长相当</li>
<li>电流分布满足辐射条件</li>
</ul>
<div class="note"><strong>麦克斯韦方程组</strong>：描述电场和磁场相互激发、传播的基本方程</div>
<h2>最简单的天线——偶极子</h2>
<p>半波偶极子天线：长度约为半波长，电流在中心最大，两端为零。这种电流分布产生有效的电磁波辐射。</p>
